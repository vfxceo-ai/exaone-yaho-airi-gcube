name: Build Stage 1 image

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - "entrypoint.sh"
      - "requirements-stt.txt"
      - "nginx.conf"
      - "supervisord.conf"
      - "app/**"
      - ".github/workflows/build.yml"

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Free disk space for CUDA layers
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc
          docker system prune --all --force
          df -h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Stage 1
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/exaone-yaho-airi:stage1
            ghcr.io/${{ github.repository_owner }}/exaone-yaho-airi:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=min
