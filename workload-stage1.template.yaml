description: "AIRI + EXAONE-Yaho + Korean STT stage 1"
cuda: ""
sharedMemory: 8

containers:
  - containerImage: "${GHCR_OWNER}/exaone-yaho-airi:stage1"
    repo: ghcr.io
    port: 8080
    maxConnection: 20
    containerCommand: ""
    isCredential: true
    containerEnvs:
      - API_KEY: "${API_KEY}"
      - LLM_MODEL_ID: "ChanLumerico/EXAONE-3.5-7.8B-Instruct-Yaho"
      - LLM_MODEL_PATH: "/models/llm/gguf/EXAONE-3.5-7.8B-Instruct-Yaho-Q4_K_M.gguf"
      - LLM_HEALTH_URL: "http://127.0.0.1:8000/health"
      - STT_MODEL_ID: "/models/stt"
      - STT_COMPUTE_TYPE: "int8_float16"
      - STT_LANGUAGE: "ko"
      - LLAMA_CTX_SIZE: "4096"
      - LLAMA_N_GPU_LAYERS: "99"
      - LLAMA_PARALLEL: "1"
      - LOG_LEVEL: "INFO"
    userStorages:
      - "98": "/mnt/dropbox"

gpuSpecs:
  - gpuCode: "024"
