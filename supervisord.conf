[supervisord]
nodaemon=true
logfile=/dev/null
pidfile=/tmp/supervisord.pid

[program:stt-api]
command=/opt/stt-venv/bin/uvicorn app.main:app --app-dir /opt/app --host 127.0.0.1 --port 8001 --workers 1
directory=/opt/app
priority=10
autostart=true
autorestart=unexpected
startsecs=3
stopsignal=TERM
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:llama-server]
command=/bin/bash -lc 'exec /app/llama-server -m "$LLM_MODEL_PATH" --host 127.0.0.1 --port 8000 --jinja --api-key "$API_KEY" --ctx-size "$LLAMA_CTX_SIZE" --parallel "$LLAMA_PARALLEL" --n-gpu-layers "$LLAMA_N_GPU_LAYERS"'
directory=/app
priority=10
autostart=true
autorestart=unexpected
startsecs=15
stopasgroup=true
killasgroup=true
stopsignal=TERM
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:nginx]
command=/usr/sbin/nginx -g "daemon off;"
priority=20
autostart=true
autorestart=unexpected
startsecs=3
stopsignal=QUIT
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
